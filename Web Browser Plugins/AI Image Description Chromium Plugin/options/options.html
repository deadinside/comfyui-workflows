<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Image Details - Plugin Settings</title>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, sans-serif;
      background: #fafafa;
      color: #222;
      max-width: 480px;
    }

    h2 {
      margin-top: 0;
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #444;
    }

    input[type="text"], select {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      color: #222;
      box-sizing: border-box;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #4a6df0;
      box-shadow: 0 0 0 2px rgba(74, 109, 240, 0.2);
    }

    .note {
      margin-top: 6px;
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }

    button {
      margin-top: 20px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      background: #4a6df0;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }
     textarea {
      margin-top: 10px;
      padding: 5px 2px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #3a59d8;
    }

    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #4a6df0;
      font-weight: 600;
    }
    body {
  --bg: #ffffff;
  --fg: #000000;
    }

    body.dark {
      --bg: #111;
      --fg: #e5e5e5;
    }
    body.dark p, label, h2{
      color:#666;
    }
    body.dark button{
      background:#222;
      color:#ccc;
    }
    body.dark select, textarea{
      background:#222;
      color:#ccc;
    }
     body.dark input[type=text]{
      background:#222;
      color:#ccc;
    }
    body, #output, #status {
      background: var(--bg);
      color: var(--fg);
    }
  </style>
</head>

<body>
  <h2>AI Image Details - Plugin Settings</h2>

  <label for="urlInput">LLM / ComfyUI URL:</label>
  <input id="urlInput" type="text" placeholder="http://127.0.0.1:8188">
  <button id="testBtn" style="margin-top:10px;">Test Connection</button>

  <div id="testStatus" style="margin-top:8px; font-size:13px;"></div>

  <div class="note">
    Enter your ComfyUI server address.<br>
    The extension will automatically add <code>/prompt</code>.
  </div>

  <label for="modelSelect">Model (Gemma Or Qwen):</label>
  <select id="modelSelect">
<option value="qwen3.5_4b_bf16.safetensors">qwen3.5_4b_bf16</option>
    <option value="qwen3.5_9b_bf16.safetensors">qwen3.5_9b_bf16</option>
    <option value="gemma_3_12B_it_fp4_mixed.safetensors">Gemma 3 12B IT FP4 Mixed</option>
    <option value="gemma_3_12B_it_fp8_scaled.safetensors">Gemma 3 12B IT FP8 Scaled</option>
    <option value="gemma_3_12B_it_fpmixed.safetensors">Gemma 3 12B IT FP Mixed</option>
    <option value="gemma_3_12B_it.safetensors">Gemma 3 12B IT</option>
  </select>

  <label>
    Custom prompt:<br>
    <textarea id="customPrompt" rows="6"></textarea>
  </label>
  <p class="tip">Tip: Leave blank to use the default prompt.</p>
 
  <label class="toggle">
  <input type="checkbox" id="darkModeToggle">
  Dark mode
  </label>
  <button id="saveBtn">Save</button>

  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>

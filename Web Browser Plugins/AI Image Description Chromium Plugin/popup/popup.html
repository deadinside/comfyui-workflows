<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, sans-serif;
      background: #fafafa;
      color: #222;
    }

    #status {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #444;
    }

    #output {
      margin-top: 12px;
      padding: 12px;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
      max-height: 260px;
      overflow-y: auto;
    }

    #copyBtn {
      margin-top: 12px;
      padding: 8px 12px;
      width: 100%;
      border: none;
      border-radius: 6px;
      background: #4a6df0;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    #copyBtn:hover {
      background: #3a59d8;
    }
    body {
  --bg: #ffffff;
  --fg: #000000;
    }

    body.dark {
      --bg: #111;
      --fg: #e5e5e5;
    }

    body, #output, #status {
      background: var(--bg);
      color: var(--fg);
    }
  </style>
</head>
<body>
  <div id="status">Waiting for description...</div>
  <div id="output"></div>
  <button id="copyBtn" style="display:none;">Copy</button>

  <script src="popup.js"></script>
</body>
</html>
